<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkey</title>
    <style>
        body {
            display: grid;
            place-content: center;
            background: black;
            height: 80vh;
        }

        div.image {
            margin-top: 50px;
            height: 30rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        div.image img{
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }


        h4 {
            color: #fff;
            font-size: 25px;
        }
    </style>
</head>

<body>

    <div class="image">
        <img src="images/image.png" alt="Monkey-picture">
    </div>

    <h4>
        Moneky say's : You're so pretty.💖💖
    </h4>
</body>


</html>
